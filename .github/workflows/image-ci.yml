name: image-ci

on:
  push:
    branches:
      - "main"
    tags:
      - "[0-9]*.[0-9]*.[0-9]*"
    paths:
      # Only rebuild images when applications change
      - "02-Source-Code-and-Dockerfiles/**/*"

jobs:
  generate-image-tag:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate-image-tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Necessary to get all tags for IMAGE_TAG generation with git describe
          fetch-depth: 0

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Image Tag
        id: generate-image-tag
        working-directory: 05-cicd-github-actions/github-actions
        run: |
          image_tag=$(task generate-version-tag)
          echo "image_tag=$image_tag" >> $GITHUB_OUTPUT

  build-tag-push:
    runs-on: ubuntu-latest
    needs: generate-image-tag
    strategy:
      matrix:
        path:
          - 02-Source-Code-and-Dockerfiles/api-golang
          - 02-Source-Code-and-Dockerfiles/api-node
          - 02-Source-Code-and-Dockerfiles/client-react
          - 02-Source-Code-and-Dockerfiles/load-generator-python
          - 02-Source-Code-and-Dockerfiles/postgresql

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: actions/setup-go@v6
        if: matrix.path == '02-Source-Code-and-Dockerfiles/api-golang'
        with:
          go-version-file: 02-Source-Code-and-Dockerfiles/api-golang/go.mod

      - uses: ko-build/setup-ko@v0.9
        if: matrix.path == '02-Source-Code-and-Dockerfiles/api-golang'
        with:
          version: v0.15.4

      - name: Build Image
        env:
          IMAGE_TAG: ${{ needs.generate-image-tag.outputs.image_tag }}
        working-directory: ${{ matrix.path }}
        run: |
          task build-container-image-multi-arch IMAGE_TAG=${IMAGE_TAG}

  update-tags:
    runs-on: ubuntu-latest
    needs: [generate-image-tag, build-tag-push]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Task
        uses: arduino/setup-task@v3
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tags
        working-directory: 05-cicd-github-actions/github-actions
        env:
          IMAGE_TAG: ${{ needs.generate-image-tag.outputs.image_tag }}
        run: |
          task update-app-image-tags NEW_TAG=${IMAGE_TAG}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          base: main
          token: ${{ secrets.DEVOPS_CV_PROJECT_GITHUB_ACTION_PAT }}
          title: "Update image tags to (${{ needs.generate-image-tag.outputs.image_tag }})"