apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-migrate
  namespace: demo-app
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: klausanders444/kubernetes-learning-postgresql:foobarbaz
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-database-url
                  key: DATABASE_URL
          args:
            - "-path=/app/migrations"
            - "-database=$(DATABASE_URL)"
            - "up"