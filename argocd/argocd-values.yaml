configs:
  params:
    server.insecure: true
  cm:
    resource.customizations.health.postgresql.cnpg.io_Cluster: |
      hs = {}
      if obj.status == nil then
        hs.status = "Progressing"
        hs.message = "Waiting for CNPG Cluster status to be reported"
        return hs
      end

      local phase = obj.status.phase
      local ready = obj.status.readyInstances or 0
      local total = obj.status.instances or 0

      if phase == "Cluster in healthy state" and ready == total and total > 0 then
        hs.status = "Healthy"
        hs.message = ready .. "/" .. total .. " instances ready"
        return hs
      end

      if phase == "Failed" or phase == "Unknown" then
        hs.status = "Degraded"
        hs.message = phase
        return hs
      end

      hs.status = "Progressing"
      hs.message = (phase or "no phase yet") .. " (" .. ready .. "/" .. total .. " ready)"
      return hs

    resource.customizations.health.external-secrets.io_ExternalSecret: |
      hs = {}
      if obj.status == nil or obj.status.conditions == nil then
        hs.status = "Progressing"
        hs.message = "Waiting for ExternalSecret to report status"
        return hs
      end

      for i, condition in ipairs(obj.status.conditions) do
        if condition.type == "Ready" then
          if condition.status == "True" then
            hs.status = "Healthy"
            hs.message = condition.message or "Secret synced"
            return hs
          else
            hs.status = "Degraded"
            hs.message = condition.message or "ExternalSecret not ready"
            return hs
          end
        end
      end

      hs.status = "Progressing"
      hs.message = "Waiting for Ready condition"
      return hs

    resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
      jqPathExpressions:
        - '.spec.data[].remoteRef.conversionStrategy'
        - '.spec.data[].remoteRef.decodingStrategy'
        - '.spec.data[].remoteRef.metadataPolicy'
