# argocd/apps/kube-prometheus-stack.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 65.5.1
      helm:
        valueFiles:
          - $values/04-eso-and-cnpg-and-tilt/kube-prometheus-stack/values.yaml
    - repoURL: https://github.com/klausanderson/devops-cv-project
      targetRevision: main
      ref: values
    - repoURL: https://github.com/klausanderson/devops-cv-project
      targetRevision: main
      path: 04-eso-and-cnpg-and-tilt/kube-prometheus-stack/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true