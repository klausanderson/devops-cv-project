apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: api-golang
  namespace: argocd
  annotations: 
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/klausanderson/devops-cv-project
    targetRevision: main
    path: 03-Project-manifests/api-golang
  destination:
    server: https://kubernetes.default.svc
    namespace: demo-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true