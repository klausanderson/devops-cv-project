apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: argocd-server-tls
  namespace: traefik
spec:
  secretName: argocd-server-tls
  dnsNames:
    - argocd.klaus-devops-journey.com
  issuerRef:
    name: letsencrypt-prod     # or letsencrypt-staging while testing
    kind: ClusterIssuer