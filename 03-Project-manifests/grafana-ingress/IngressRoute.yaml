apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.klaus-devops-journey.com`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana   # match Helm release name
          namespace: monitoring
          port: 80
  tls:
    secretName: grafana-tls