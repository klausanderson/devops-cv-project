apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-api-overview
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  api-overview.json: |
    {
      "uid": "api-golang-runtime",
      "title": "API Golang - Runtime Overview",
      "tags": ["api-golang", "demo-app", "go-runtime"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "templating": {
        "list": [
          { "name": "datasource", "type": "datasource", "query": "prometheus", "current": {} }
        ]
      },

      "panels": [
        {
          "id": 1,
          "title": "Goroutines",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "go_goroutines{job=\"api-golang\"}",
              "legendFormat": "goroutines",
              "refId": "A"
            }
          ]
        },

        {
          "id": 2,
          "title": "CPU usage rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "rate(process_cpu_seconds_total{job=\"api-golang\"}[5m])",
              "legendFormat": "cpu seconds/sec",
              "refId": "A"
            }
          ]
        },

        {
          "id": 3,
          "title": "Open file descriptors",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "process_open_fds{job=\"api-golang\"}",
              "legendFormat": "open",
              "refId": "A"
            },
            {
              "expr": "process_max_fds{job=\"api-golang\"}",
              "legendFormat": "max",
              "refId": "B"
            }
          ]
        },

        {
          "id": 4,
          "title": "Memory - heap vs resident",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "go_memstats_heap_alloc_bytes{job=\"api-golang\"}",
              "legendFormat": "heap alloc",
              "refId": "A"
            },
            {
              "expr": "process_resident_memory_bytes{job=\"api-golang\"}",
              "legendFormat": "RSS",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes" },
            "overrides": []
          }
        },

        {
          "id": 5,
          "title": "GC pause duration (avg)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "rate(go_gc_duration_seconds_sum{job=\"api-golang\"}[5m]) / rate(go_gc_duration_seconds_count{job=\"api-golang\"}[5m])",
              "legendFormat": "avg GC pause",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          }
        },

        {
          "id": 6,
          "title": "Scrape target up",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "up{job=\"api-golang\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ]
            },
            "overrides": []
          }
        },
        
        {
          "id": 7,
          "title": "Metrics endpoint scrapes in flight",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "$datasource" },
          "targets": [
            {
              "expr": "promhttp_metric_handler_requests_in_flight{job=\"api-golang\"}",
              "refId": "A"
            }
          ]
        }
      ]
    }